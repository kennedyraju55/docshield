<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" fill="none">
  <rect width="1000" height="200" rx="12" fill="#0f172a"/>

  <!-- Step 1 -->
  <g transform="translate(50, 30)">
    <circle cx="40" cy="40" r="40" fill="#1e293b" stroke="#334155"/>
    <text x="40" y="35" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="28">&#x1F4F7;</text>
    <text x="40" y="58" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="11" font-weight="800">1</text>
    <text x="40" y="105" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="13" font-weight="700">Upload</text>
    <text x="40" y="125" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Photo, scan, or</text>
    <text x="40" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">paste text</text>
  </g>

  <!-- Arrow -->
  <line x1="140" y1="70" x2="195" y2="70" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <g transform="translate(205, 30)">
    <circle cx="40" cy="40" r="40" fill="#1e293b" stroke="#334155"/>
    <text x="40" y="35" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="28">&#x1F50D;</text>
    <text x="40" y="58" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="11" font-weight="800">2</text>
    <text x="40" y="105" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="13" font-weight="700">Read &amp; Classify</text>
    <text x="40" y="125" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Gemma 4 Vision</text>
    <text x="40" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">extracts all text</text>
  </g>

  <!-- Arrow -->
  <line x1="295" y1="70" x2="370" y2="70" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <g transform="translate(380, 30)">
    <circle cx="40" cy="40" r="40" fill="#1e293b" stroke="#334155"/>
    <text x="40" y="35" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="28">&#x1F4AC;</text>
    <text x="40" y="58" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="11" font-weight="800">3</text>
    <text x="40" y="105" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="13" font-weight="700">Explain</text>
    <text x="40" y="125" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Jargon translated</text>
    <text x="40" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">to plain language</text>
  </g>

  <!-- Arrow -->
  <line x1="470" y1="70" x2="545" y2="70" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <g transform="translate(555, 30)">
    <circle cx="40" cy="40" r="40" fill="#1e293b" stroke="#334155"/>
    <text x="40" y="35" text-anchor="middle" fill="#f87171" font-family="system-ui" font-size="28">&#x1F6E1;</text>
    <text x="40" y="58" text-anchor="middle" fill="#f87171" font-family="system-ui" font-size="11" font-weight="800">4</text>
    <text x="40" y="105" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="13" font-weight="700">Check Safety</text>
    <text x="40" y="125" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Drug interactions</text>
    <text x="40" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">+ billing errors</text>
  </g>

  <!-- Arrow -->
  <line x1="645" y1="70" x2="720" y2="70" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <g transform="translate(730, 30)">
    <circle cx="40" cy="40" r="40" fill="#1e293b" stroke="#334155"/>
    <text x="40" y="35" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="28">&#x2705;</text>
    <text x="40" y="58" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="11" font-weight="800">5</text>
    <text x="40" y="105" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="13" font-weight="700">Take Action</text>
    <text x="40" y="125" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Clear next steps</text>
    <text x="40" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">for your health</text>
  </g>

  <!-- Bottom label -->
  <text x="500" y="185" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="11" font-style="italic">Everything happens locally on your device. Zero data sent to the cloud.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
  </defs>
</svg>
