<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <rect width="800" height="380" rx="12" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="16" font-weight="700">Use Case: Lab Report Explained</text>

  <!-- Input -->
  <rect x="30" y="55" width="340" height="310" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="200" y="80" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12" font-weight="600">INPUT: Blood Test Results</text>
  <line x1="50" y1="90" x2="350" y2="90" stroke="#334155"/>
  <text x="50" y="112" fill="#94a3b8" font-family="Consolas, monospace" font-size="9">TEST              RESULT    REF RANGE</text>
  <line x1="50" y1="120" x2="350" y2="120" stroke="#334155" stroke-dasharray="2"/>
  <text x="50" y="138" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">WBC               11.2      4.5-11.0</text>
  <text x="330" y="138" fill="#f87171" font-family="Consolas, monospace" font-size="9" text-anchor="end">HIGH</text>
  <text x="50" y="158" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">Glucose (fasting) 126       70-100</text>
  <text x="330" y="158" fill="#f87171" font-family="Consolas, monospace" font-size="9" text-anchor="end">HIGH</text>
  <text x="50" y="178" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">Creatinine        1.4       0.6-1.2</text>
  <text x="330" y="178" fill="#f87171" font-family="Consolas, monospace" font-size="9" text-anchor="end">HIGH</text>
  <text x="50" y="198" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">Total Cholesterol 248       &lt;200</text>
  <text x="330" y="198" fill="#f87171" font-family="Consolas, monospace" font-size="9" text-anchor="end">HIGH</text>
  <text x="50" y="218" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">LDL               168       &lt;100</text>
  <text x="330" y="218" fill="#f87171" font-family="Consolas, monospace" font-size="9" text-anchor="end">HIGH</text>
  <text x="50" y="238" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">HDL               38        &gt;40</text>
  <text x="330" y="238" fill="#fbbf24" font-family="Consolas, monospace" font-size="9" text-anchor="end">LOW</text>
  <text x="50" y="258" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">HbA1c             6.8%      &lt;5.7%</text>
  <text x="330" y="258" fill="#f87171" font-family="Consolas, monospace" font-size="9" text-anchor="end">HIGH</text>

  <!-- Arrow -->
  <text x="395" y="200" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="24">&#x27A1;</text>

  <!-- Output -->
  <rect x="430" y="55" width="340" height="310" rx="10" fill="#111827" stroke="#334155"/>
  <text x="600" y="80" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="12" font-weight="600">DOCSHIELD EXPLANATION</text>
  <line x1="450" y1="90" x2="750" y2="90" stroke="#334155"/>

  <text x="455" y="112" fill="#38bdf8" font-family="system-ui" font-size="11" font-weight="700">What This Means:</text>

  <text x="455" y="136" fill="#f87171" font-family="system-ui" font-size="10" font-weight="600">Cholesterol (LDL: 168)</text>
  <text x="455" y="152" fill="#e2e8f0" font-family="system-ui" font-size="10">"Your bad cholesterol is high. Target</text>
  <text x="455" y="166" fill="#e2e8f0" font-family="system-ui" font-size="10">is under 100. Diet changes may help."</text>

  <text x="455" y="192" fill="#f87171" font-family="system-ui" font-size="10" font-weight="600">Blood Sugar (HbA1c: 6.8%)</text>
  <text x="455" y="208" fill="#e2e8f0" font-family="system-ui" font-size="10">"Your 3-month average blood sugar is</text>
  <text x="455" y="222" fill="#e2e8f0" font-family="system-ui" font-size="10">in the pre-diabetic range (5.7-6.4%)."</text>

  <text x="455" y="248" fill="#fbbf24" font-family="system-ui" font-size="10" font-weight="600">Kidney Function (Creatinine: 1.4)</text>
  <text x="455" y="264" fill="#e2e8f0" font-family="system-ui" font-size="10">"Slightly elevated. Could indicate early</text>
  <text x="455" y="278" fill="#e2e8f0" font-family="system-ui" font-size="10">kidney stress. Needs monitoring."</text>

  <!-- Action -->
  <rect x="445" y="295" width="310" height="58" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-opacity="0.5"/>
  <text x="455" y="314" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="700">What To Do Next:</text>
  <text x="455" y="330" fill="#93c5fd" font-family="system-ui" font-size="10">1. Talk to doctor about diet changes</text>
  <text x="455" y="346" fill="#93c5fd" font-family="system-ui" font-size="10">2. Recheck HbA1c in 3 months</text>
</svg>
