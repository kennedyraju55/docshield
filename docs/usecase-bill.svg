<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <text x="400" y="32" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="16" font-weight="700">Use Case: Hospital Bill Audit</text>

  <!-- Input -->
  <rect x="30" y="55" width="340" height="330" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="200" y="80" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12" font-weight="600">INPUT: Hospital Bill</text>
  <line x1="50" y1="90" x2="350" y2="90" stroke="#334155"/>
  <text x="50" y="112" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">ER Visit (99284)       $2,800</text>
  <text x="50" y="132" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">Chest X-ray (71046)      $950</text>
  <text x="50" y="152" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">EKG (93000)              $450</text>
  <text x="50" y="172" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">CBC Blood Test (85025)   $250</text>
  <text x="50" y="192" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">IV Saline x3 (J3490)   $2,400</text>
  <text x="50" y="212" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">Room (1 night)         $8,500</text>
  <text x="50" y="232" fill="#e2e8f0" font-family="Consolas, monospace" font-size="10">Blood Draw (36415)        $95</text>
  <line x1="50" y1="245" x2="350" y2="245" stroke="#334155"/>
  <text x="50" y="268" fill="#fbbf24" font-family="Consolas, monospace" font-size="11" font-weight="700">TOTAL:               $15,865</text>
  <text x="50" y="288" fill="#94a3b8" font-family="Consolas, monospace" font-size="10">Insurance:           -$4,200</text>
  <text x="50" y="308" fill="#f87171" font-family="Consolas, monospace" font-size="11" font-weight="700">YOU OWE:             $11,665</text>

  <!-- Arrow -->
  <text x="395" y="210" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="24">&#x27A1;</text>

  <!-- Output -->
  <rect x="430" y="55" width="340" height="330" rx="10" fill="#111827" stroke="#334155"/>
  <text x="600" y="80" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600">DOCSHIELD BILL ANALYSIS</text>
  <line x1="450" y1="90" x2="750" y2="90" stroke="#334155"/>

  <!-- Overcharge items -->
  <rect x="445" y="98" width="310" height="42" rx="5" fill="#3b1f1f" stroke="#7f1d1d" stroke-opacity="0.5"/>
  <text x="455" y="115" fill="#f87171" font-family="system-ui" font-size="10" font-weight="600">Chest X-ray: $950 charged</text>
  <text x="455" y="132" fill="#fca5a5" font-family="system-ui" font-size="9">Typical: $50-$300 | OVERCHARGE: +$650</text>

  <rect x="445" y="148" width="310" height="42" rx="5" fill="#3b1f1f" stroke="#7f1d1d" stroke-opacity="0.5"/>
  <text x="455" y="165" fill="#f87171" font-family="system-ui" font-size="10" font-weight="600">EKG: $450 charged</text>
  <text x="455" y="182" fill="#fca5a5" font-family="system-ui" font-size="9">Typical: $20-$100 | OVERCHARGE: +$350</text>

  <rect x="445" y="198" width="310" height="42" rx="5" fill="#3b1f1f" stroke="#7f1d1d" stroke-opacity="0.5"/>
  <text x="455" y="215" fill="#f87171" font-family="system-ui" font-size="10" font-weight="600">IV Saline x3: $2,400 charged</text>
  <text x="455" y="232" fill="#fca5a5" font-family="system-ui" font-size="9">Wholesale: ~$3 total | EXTREME MARKUP</text>

  <rect x="445" y="248" width="310" height="42" rx="5" fill="#3b2f1f" stroke="#92400e" stroke-opacity="0.5"/>
  <text x="455" y="265" fill="#fbbf24" font-family="system-ui" font-size="10" font-weight="600">Room (1 night): $8,500 charged</text>
  <text x="455" y="282" fill="#fde68a" font-family="system-ui" font-size="9">Typical: $2,500-$4,500 | OVERCHARGE: +$4,000</text>

  <!-- Total -->
  <rect x="445" y="300" width="310" height="34" rx="6" fill="#3b1f1f" stroke="#dc2626"/>
  <text x="600" y="322" text-anchor="middle" fill="#f87171" font-family="system-ui" font-size="12" font-weight="700">POTENTIAL OVERCHARGES: ~$5,000+</text>

  <!-- Action -->
  <rect x="445" y="342" width="310" height="34" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-opacity="0.5"/>
  <text x="600" y="364" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600">ACTION: Request itemized bill review</text>
</svg>
