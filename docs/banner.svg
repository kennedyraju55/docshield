<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Glow effects -->
  <circle cx="300" cy="200" r="200" fill="#2563eb" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="900" cy="200" r="200" fill="#7c3aed" opacity="0.06" filter="url(#blur2)"/>
  <circle cx="600" cy="350" r="150" fill="#38bdf8" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(510, 60)">
    <path d="M90 0 L180 40 L180 110 C180 160 140 200 90 220 C40 200 0 160 0 110 L0 40 Z" fill="url(#logoGrad)" opacity="0.15" stroke="#38bdf8" stroke-width="2"/>
    <text x="90" y="130" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="72" font-weight="800">D</text>
  </g>

  <!-- Title -->
  <text x="600" y="215" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="56" font-weight="800" letter-spacing="-1">Doc<tspan fill="#38bdf8">Shield</tspan></text>

  <!-- Subtitle -->
  <text x="600" y="255" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="20" font-weight="400">Privacy-First Medical Document Assistant</text>

  <!-- Feature pills -->
  <g transform="translate(600, 285)">
    <!-- Gemma 4 -->
    <rect x="-310" y="0" width="140" height="32" rx="16" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1"/>
    <text x="-240" y="21" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="12" font-weight="600">Gemma 4 Powered</text>

    <!-- Multi-Agent -->
    <rect x="-155" y="0" width="120" height="32" rx="16" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="1"/>
    <text x="-95" y="21" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="12" font-weight="600">5 AI Agents</text>

    <!-- Local -->
    <rect x="-20" y="0" width="140" height="32" rx="16" fill="#0f2a1f" stroke="#166534" stroke-width="1"/>
    <text x="50" y="21" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="12" font-weight="600">100% Local</text>

    <!-- Function Calling -->
    <rect x="135" y="0" width="175" height="32" rx="16" fill="#3b2f1f" stroke="#92400e" stroke-width="1"/>
    <text x="222" y="21" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600">Native Function Calling</text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(600, 345)">
    <text x="-250" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="13">
      <tspan fill="#f87171" font-weight="700" font-size="20">40+</tspan> Drug Interactions
    </text>
    <text x="-50" y="16" text-anchor="middle" fill="#475569">|</text>
    <text x="50" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="13">
      <tspan fill="#fbbf24" font-weight="700" font-size="20">50+</tspan> Billing Codes
    </text>
    <text x="150" y="16" text-anchor="middle" fill="#475569">|</text>
    <text x="270" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="13">
      <tspan fill="#4ade80" font-weight="700" font-size="20">22</tspan> Tests Passing
    </text>
  </g>

  <!-- Bottom border glow -->
  <rect x="200" y="394" width="800" height="6" rx="3" fill="url(#glow)"/>
</svg>
